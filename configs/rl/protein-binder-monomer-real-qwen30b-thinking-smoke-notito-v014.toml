name = "protein-binder-qwen30b-thinking-smoke-notito-v014"
model = "Qwen/Qwen3-30B-A3B-Thinking-2507"
max_steps = 2
batch_size = 1
rollouts_per_example = 1
max_async_level = 1
use_token_client = false
max_inflight_rollouts = 1
max_concurrent = 1

[sampling]
max_tokens = 1024
temperature = 0.7

[sampling.extra_body.chat_template_kwargs]
enable_thinking = false

[[env]]
id = "d42me/protein-binder-monomer-real@0.1.4"
args = { num_train_examples = 4, num_eval_examples = 1, max_turns = 8, task_library = "proven" }

[infrastructure]
compute_size = "S"
